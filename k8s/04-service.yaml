apiVersion: v1
kind: Service
metadata:
  name: threat-index
  namespace: threat-index
  labels:
    app: threat-index
spec:
  type: ClusterIP          # the Ingress (05) exposes it publicly; no LoadBalancer per Service
  selector:
    app: threat-index
  ports:
    - name: http
      port: 80
      targetPort: 8080
