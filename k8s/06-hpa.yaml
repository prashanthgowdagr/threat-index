apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: threat-index
  namespace: threat-index
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: threat-index
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50      # scale up when avg CPU > 50% of the 100m request
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120  # avoid flapping after a load spike
# Requires metrics-server. Install once with:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
