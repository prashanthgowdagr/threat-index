apiVersion: v1
kind: Secret
metadata:
  name: threat-index-secret
  namespace: threat-index
type: Opaque
# stringData lets you write plaintext; Kubernetes base64-encodes it on apply.
# IMPORTANT (matches the "Unencrypted / Hardcoded Secrets" entry in the app):
# base64 is encoding, NOT encryption. In a real cluster, enable EKS envelope
# encryption with a KMS key, and prefer the Secrets Store CSI driver backed by
# AWS Secrets Manager instead of committing secrets to Git.
stringData:
  API_KEY: "study-api-key-change-me"
