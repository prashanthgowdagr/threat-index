# Least-privilege RBAC example.
# The app itself doesn't need API access (note automountServiceAccountToken: false
# in the Deployment), but this shows the pattern: a dedicated ServiceAccount bound
# to a Role scoped to ONLY read pods in ONLY this namespace — no cluster-wide reach.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: threat-index-sa
  namespace: threat-index
  # For IRSA (give this SA its own narrow IAM role instead of the node role), add:
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/threat-index-irsa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: threat-index-reader
  namespace: threat-index
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]   # read-only, no create/delete, no secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: threat-index-reader-binding
  namespace: threat-index
subjects:
  - kind: ServiceAccount
    name: threat-index-sa
    namespace: threat-index
roleRef:
  kind: Role
  name: threat-index-reader
  apiGroup: rbac.authorization.k8s.io
